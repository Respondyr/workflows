# verify-deployment.yml — Real image-SHA gate via /<svc>/version
#
# Polls https://<base_url>/<service_name>/version until the response body
# matches the PR's expected SHA, with a "confirm streak" so the
# transient overlap between old and new pods during a Kubernetes rolling
# restart doesn't produce a false positive.
#
# Contract on the service side:
#   - base-service Helm chart (>= 0.14.0) injects GIT_SHA into the pod
#     from .Values.deployment.image.tag — the same value deploy-dev.yml
#     writes per PR.
#   - The service code exposes /version returning that exact value as the
#     response body (text/plain, no JSON wrapping).
#
# Why not kubectl: dev EKS public API endpoint is CIDR-locked to a /32,
# unreachable from GHA runners. Why not ArgoCD: M2M tokens fail audience
# verification on the default OIDC config — fixable but more knobs.
#
# Limitations:
#   - If a service forgets to add /version, this will fail until they do.
#     That's intentional — every service needs the same SHA-gate contract.
#   - If the service is healthy but returns "unknown" for GIT_SHA, the
#     match will fail. That's also intentional — it means the Helm chart
#     didn't inject GIT_SHA (chart out of date, env block override, etc).

name: Verify Deployment

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service name — used in URL path: <base_url>/<service_name>/version"
        required: true
        type: string
      expected_sha:
        description: "Git SHA the pod should be running (PR merge commit's github.sha)"
        required: true
        type: string
      base_url:
        description: "Dev API base URL"
        required: false
        type: string
        default: "https://dev-api.respondyr.com"
      version_path:
        description: "Path appended to base_url. Default is conventional `/<svc>/version`."
        required: false
        type: string
        default: ""
      timeout_seconds:
        description: "How long to poll before failing"
        required: false
        type: number
        default: 360
      confirm_streak:
        description: "Number of consecutive matching responses required before exit 0. Defeats the rolling-restart overlap window where ingress may briefly route to the old pod."
        required: false
        type: number
        default: 3
      poll_interval_seconds:
        description: "Seconds between polls"
        required: false
        type: number
        default: 5

permissions:
  contents: read

jobs:
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Poll /version for SHA match
        run: |
          SVC="${{ inputs.service_name }}"
          BASE="${{ inputs.base_url }}"
          PATH_IN="${{ inputs.version_path }}"
          [ -z "$PATH_IN" ] && PATH_IN="/${SVC}/version"
          URL="${BASE}${PATH_IN}"
          SHA="${{ inputs.expected_sha }}"
          DEADLINE=$(( $(date +%s) + ${{ inputs.timeout_seconds }} ))
          STREAK=0
          REQUIRED=${{ inputs.confirm_streak }}

          echo "Polling $URL for body exactly == $SHA (need $REQUIRED consecutive matches)"

          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            # --max-time keeps a stalled connection from eating the full poll interval.
            # Capture body + http code so we can distinguish "404 path missing" from
            # "200 but wrong SHA" from "5xx pod restarting".
            RESP=$(curl -sS -o /tmp/body -w "%{http_code}" --max-time 6 "$URL" || echo "000")
            BODY=$(head -c 64 /tmp/body 2>/dev/null | tr -d '[:space:]')
            ELAPSED=$(( ${{ inputs.timeout_seconds }} - DEADLINE + $(date +%s) ))
            if [ "$RESP" = "200" ] && [ "$BODY" = "$SHA" ]; then
              STREAK=$((STREAK + 1))
              echo "http: $URL → $RESP body=$BODY (match $STREAK/$REQUIRED, t+${ELAPSED}s)"
              if [ "$STREAK" -ge "$REQUIRED" ]; then
                echo "::notice::$SVC /version returns $SHA on $REQUIRED consecutive polls — new pod confirmed serving"
                exit 0
              fi
            else
              if [ "$STREAK" -gt 0 ]; then
                echo "http: $URL → $RESP body=${BODY:-<empty>} (streak reset from $STREAK, t+${ELAPSED}s)"
              else
                echo "http: $URL → $RESP body=${BODY:-<empty>} (t+${ELAPSED}s)"
              fi
              STREAK=0
            fi
            sleep ${{ inputs.poll_interval_seconds }}
          done

          echo "::error::$URL never produced $REQUIRED consecutive responses with body=$SHA within ${{ inputs.timeout_seconds }}s"
          echo "::error::Last response: $RESP body=${BODY:-<empty>}"
          echo "::error::If body was 'unknown', the base-service chart didn't inject GIT_SHA — check the service is on base-service >= 0.14.0."
          echo "::error::If 404, the service is missing the /version handler — see workspace-docs/cicd/PLAN-AUTOMATED-RELEASE-WORKFLOWS.html Phase 4."
          exit 1
