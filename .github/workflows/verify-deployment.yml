# verify-deployment.yml — Reusable rollout verification (kubectl-based)
#
# Confirms the dev cluster is actually serving the image built from a given
# git SHA before integration tests run against it. Reads the live Deployment
# in the service's namespace and waits for:
#
#   spec.template.spec.containers[0].image endsWith ":<expected_sha>"
#   status.observedGeneration >= metadata.generation
#   status.availableReplicas  == status.replicas (and > 0)
#
# Why kubectl-only (initial design also probed ArgoCD): ArgoCD's
# `status.sync.revision` is the *deploy-dev bot commit* (the [skip ci]
# commit that bumps helm/values-dev.yaml), NOT the PR's merge SHA we care
# about. Cross-referencing those needs another round-trip and complicates
# the workflow without buying real signal — the Deployment image field is
# already the ground truth. The Cognito M2M + ArgoCD-fast-path is set up
# in infra (Phase 2 TF, Respondyr/infra#239) and can be added later as
# Phase 2b if GHA-minute burn becomes measurable.
#
# Permissions: assumes the dev `respondyr-gha-dev` IAM role (trust policy
# accepts any Respondyr repo on any ref). That role has `eks:DescribeCluster`
# and an EKS access entry bound to AmazonEKSViewPolicy.

name: Verify Deployment

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service name — used as Deployment name and (by default) namespace"
        required: true
        type: string
      expected_sha:
        description: "Git SHA the pod should be running (usually github.sha of the PR)"
        required: true
        type: string
      environment:
        description: "dev | prod (only wired for dev today)"
        required: false
        type: string
        default: "dev"
      timeout_seconds:
        description: "How long to poll the Deployment before failing"
        required: false
        type: number
        default: 240
      namespace:
        description: "Kubernetes namespace. Defaults to service_name (each service has its own namespace)."
        required: false
        type: string
        default: ""
      aws_role_arn:
        description: "IAM role to assume. Default = dev `respondyr-gha-dev` (has EKS view access). NOT the per-service `ecr-push-*` role."
        required: false
        type: string
        default: "arn:aws:iam::987213268382:role/respondyr-gha-dev"

permissions:
  id-token: write
  contents: read

jobs:
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-2' }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "respondyr-${{ inputs.environment }}-eks" \
            --region "${{ vars.AWS_REGION || 'us-east-2' }}"

      - name: Poll Deployment image + rollout
        run: |
          SVC="${{ inputs.service_name }}"
          NS="${{ inputs.namespace }}"
          [ -z "$NS" ] && NS="$SVC"
          SHA="${{ inputs.expected_sha }}"
          DEADLINE=$(( $(date +%s) + ${{ inputs.timeout_seconds }} ))

          echo "Polling deployment/$SVC in ns/$NS for image :$SHA"

          # Loop is defensive: each kubectl/jq call uses a default so transient
          # NotFound (deployment not yet created), parse errors, or empty output
          # don't blow up the script. `set -e` deliberately omitted.
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            DEP=$(kubectl -n "$NS" get deployment "$SVC" -o json 2>/dev/null)
            if [ -z "$DEP" ]; then
              echo "k8s: deployment/$SVC not yet visible in ns/$NS"
              sleep 8
              continue
            fi
            IMG=$(printf '%s' "$DEP"     | jq -r '.spec.template.spec.containers[0].image // ""' 2>/dev/null)
            OBS=$(printf '%s' "$DEP"     | jq -r '.status.observedGeneration // 0'              2>/dev/null)
            GEN=$(printf '%s' "$DEP"     | jq -r '.metadata.generation // 1'                    2>/dev/null)
            AVAIL=$(printf '%s' "$DEP"   | jq -r '.status.availableReplicas // 0'               2>/dev/null)
            DESIRED=$(printf '%s' "$DEP" | jq -r '.status.replicas // 0'                        2>/dev/null)
            : "${IMG:=}" "${OBS:=0}" "${GEN:=1}" "${AVAIL:=0}" "${DESIRED:=0}"
            echo "k8s: img=${IMG##*:} obsGen=$OBS/$GEN avail=$AVAIL/$DESIRED expected=$SHA"
            case "$IMG" in
              *:"$SHA")
                if [ "$OBS" -ge "$GEN" ] && [ "$AVAIL" = "$DESIRED" ] && [ "$DESIRED" -gt 0 ]; then
                  echo "::notice::$SVC running $SHA, rollout complete ($AVAIL/$DESIRED ready)"
                  exit 0
                fi
                ;;
            esac
            sleep 8
          done

          echo "::error::deployment/$SVC ns/$NS did not reach image=$SHA + rollout-complete within ${{ inputs.timeout_seconds }}s"
          kubectl -n "$NS" describe deployment "$SVC" || true
          kubectl -n "$NS" get pods -l app="$SVC" -o wide || true
          exit 1
