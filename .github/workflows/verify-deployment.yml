# verify-deployment.yml — Reusable rollout verification (HTTP health poll)
#
# Polls the service's public /<svc>/health endpoint on dev until 200,
# then waits a short settle window so ArgoCD's rolling restart can
# replace the old pod. After this job exits 0, integration-test.yml
# runs assertions against the now-stable dev surface.
#
# Why HTTP instead of kubectl or ArgoCD:
#   - The dev EKS public API server is CIDR-locked to a /32 — GitHub
#     Actions runners on Azure can't reach it.
#   - ArgoCD's /api/v1/applications/<svc> requires JWT validation against
#     its configured user-flow Cognito client; M2M tokens fail audience
#     verification. Fixable, but adds two more knobs (allowedAudiences,
#     RBAC for the M2M sub) for marginal benefit.
#   - The public ingress at https://dev-api.respondyr.com/<svc>/health
#     already proves the pod is up and serving. After deploy-dev commits
#     the new image SHA and ArgoCD reconciles, a successful /health is
#     strong-enough evidence to let integration tests run.
#
# Limitations (accepted Day 1, revisit if AI PR volume makes them real):
#   - No image-SHA-match check — a flaky old pod that responds 200 will
#     fool this. Mitigation: integration tests should assert new behavior.
#   - Fixed settle window after first 200 (default 30s) covers the typical
#     single-pod rolling restart on dev. Tunable per service via input.
#   - Cognito M2M client + IAM/EKS access entry from Respondyr/infra#239
#     are intentionally left in place for the Phase 2b ArgoCD path.

name: Verify Deployment

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service name — used in the URL path: <base_url>/<service_name>/health"
        required: true
        type: string
      expected_sha:
        description: "PR's merge SHA. Logged for debugging; not asserted here (no /version endpoint yet)."
        required: false
        type: string
        default: ""
      base_url:
        description: "Dev API base URL"
        required: false
        type: string
        default: "https://dev-api.respondyr.com"
      health_path:
        description: "Path appended to base_url for the health check. Default is conventional `/<svc>/health`."
        required: false
        type: string
        default: ""
      timeout_seconds:
        description: "How long to poll before failing"
        required: false
        type: number
        default: 300
      settle_seconds:
        description: "After first 200 response, wait this long before exiting 0 to let the rolling restart finish."
        required: false
        type: number
        default: 30

permissions:
  contents: read

jobs:
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Poll health endpoint
        run: |
          SVC="${{ inputs.service_name }}"
          BASE="${{ inputs.base_url }}"
          PATH_IN="${{ inputs.health_path }}"
          [ -z "$PATH_IN" ] && PATH_IN="/${SVC}/health"
          URL="${BASE}${PATH_IN}"
          SHA="${{ inputs.expected_sha }}"
          DEADLINE=$(( $(date +%s) + ${{ inputs.timeout_seconds }} ))

          echo "Polling $URL (expected_sha=${SHA:-n/a}, timeout=${{ inputs.timeout_seconds }}s, settle=${{ inputs.settle_seconds }}s)"

          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            CODE=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 8 "$URL" || echo "000")
            ELAPSED=$(( $(date +%s) + ${{ inputs.timeout_seconds }} - DEADLINE ))
            echo "http: $URL → $CODE (t+${ELAPSED}s)"
            if [ "$CODE" = "200" ]; then
              echo "::notice::$SVC /health returned 200 — settling ${{ inputs.settle_seconds }}s for rolling restart to complete"
              sleep ${{ inputs.settle_seconds }}
              exit 0
            fi
            sleep 8
          done

          echo "::error::$URL did not return 200 within ${{ inputs.timeout_seconds }}s"
          exit 1
