# python-ci.yml — PR-only Python CI
#
# Runs: uv pip install → ruff check → pytest
# No Docker. No deploy. Fast feedback on PRs.

name: Python CI

on:
  workflow_call:
    inputs:
      python_version:
        description: "Python version"
        required: false
        type: string
        default: "3.12"
      install_method:
        description: "pip (requirements.txt) or editable (pyproject.toml)"
        required: false
        type: string
        default: "pip"
      src_path:
        description: "Source path for linting"
        required: false
        type: string
        default: "src/"
      has_tests:
        description: "Run pytest"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Secret scan (gitleaks)
        # Catches accidentally-committed credentials (.env, keys, tokens).
        # P0.3 Sub-track 4.3 — prevention against re-introducing the secrets
        # we already rotated.
        #
        # We call the gitleaks CLI directly rather than `gitleaks/gitleaks-action`
        # because gitleaks-action@v2 requires a paid license for GitHub orgs
        # ("Respondyr is an organization. License key is required."). The CLI is
        # MIT-licensed and free for any use. Same scan, no subscription.
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.21.2
          curl -sSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          chmod +x /tmp/gitleaks
          # Repo-local .gitleaks.toml takes precedence; otherwise auto-fetch
          # the canonical workflows-repo allowlist.
          if [ -f .gitleaks.toml ]; then
            CONFIG=.gitleaks.toml
          else
            curl -sSL -o /tmp/.gitleaks.toml \
              "https://raw.githubusercontent.com/Respondyr/workflows/main/.gitleaks.toml" \
              || { echo "warn: failed to fetch shared .gitleaks.toml; falling back to built-in rules"; CONFIG=""; }
            [ -f /tmp/.gitleaks.toml ] && CONFIG=/tmp/.gitleaks.toml || CONFIG=""
          fi
          if [ -n "$CONFIG" ]; then
            /tmp/gitleaks dir --config "$CONFIG" --no-banner --redact .
          else
            /tmp/gitleaks dir --no-banner --redact .
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies (pip)
        if: inputs.install_method == 'pip'
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system ruff pytest 2>/dev/null || true

      - name: Configure git for private deps
        if: inputs.install_method == 'editable'
        run: git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies (editable)
        if: inputs.install_method == 'editable'
        run: |
          uv pip install --system -e ".[dev]"

      - name: Lint
        run: ruff check ${{ inputs.src_path }}
        continue-on-error: true

      - name: Test
        if: inputs.has_tests
        run: pytest tests/ -v --tb=short
