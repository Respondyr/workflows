# deploy-dev.yml — Reusable GitOps Deploy to Dev
#
# Updates the dev Helm values file with the target image tag, commits
# directly to main using a GitHub App token (bypasses branch protection),
# and notifies Discord on success or failure. ArgoCD picks up the change
# via GitOps polling/webhook — no ArgoCD API calls.
#
# Phase 2 of the dev image-tag durability fix: the previous workflow
# PATCHed ArgoCD's `spec.source.helm.parameters` so the tag lived only
# in cluster state (etcd). The 2026-05-05 colima nuke wiped etcd and
# every dev pod fell back to whatever tag was in helm/values-dev.yaml
# in git — and ECR retention had GC'd those SHAs, so the cluster sat
# in ImagePullBackOff until tags were manually re-applied. Persisting
# the tag in git makes dev recoverable from a cold-start by design.

name: Deploy to Dev (gitops)

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service name (also the ArgoCD app name)"
        required: true
        type: string
      image_tag:
        description: "Image tag to deploy (git SHA)"
        required: true
        type: string

permissions:
  contents: write

# Per-service serialization. Replaces the old global `argocd-dev` lock
# (which was needed because every dev deploy hit the same ArgoCD app's
# spec). Two services bumping their own values files don't conflict.
concurrency:
  group: deploy-dev-${{ inputs.service_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Dev (gitops)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: Respondyr

      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          # Full history so `git pull --rebase` works on retry.
          fetch-depth: 0

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && chmod +x /usr/local/bin/yq

      - name: Sanity-check values file structure
        run: |
          # `yq -i` will silently materialize missing parents, leaving the
          # file structurally wrong but with our new tag inside. Fail loudly
          # if `base-service.deployment` isn't already present.
          if ! yq e '.base-service.deployment // ""' helm/values-dev.yaml | grep -q .; then
            echo "::error::helm/values-dev.yaml is missing the .base-service.deployment block — refusing to bump"
            exit 1
          fi

      - name: Read current tag
        id: current
        run: |
          CURRENT_TAG=$(yq '.base-service.deployment.image.tag // ""' helm/values-dev.yaml)
          echo "tag=$CURRENT_TAG" >> "$GITHUB_OUTPUT"
          echo "Current tag: $CURRENT_TAG"

      - name: Skip if already at requested tag
        if: steps.current.outputs.tag == inputs.image_tag
        run: |
          echo "::notice::Dev already at ${{ inputs.image_tag }} — skipping bump"
          exit 0

      - name: Update image tag
        if: steps.current.outputs.tag != inputs.image_tag
        run: |
          export VERSION="${{ inputs.image_tag }}"
          yq -i '.base-service.deployment.image.tag = strenv(VERSION)' helm/values-dev.yaml
          echo "Updated tag to $VERSION"
          git diff helm/values-dev.yaml | head -20

      - name: Commit and push (with rebase retry)
        if: steps.current.outputs.tag != inputs.image_tag
        run: |
          # `[skip ci]` is critical: without it the bump push retriggers
          # the service repo's CI on main. `pr.yml` paths-ignore protects
          # PR-trigger-on-main, but `release.yml` may not — belt-and-
          # suspenders.
          set -euo pipefail
          export VERSION="${{ inputs.image_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values-dev.yaml
          git commit -m "deploy: bump dev image tag for ${{ inputs.service_name }} to ${VERSION} [skip ci]"
          for attempt in 1 2 3; do
            if git pull --rebase origin main; then
              if git push origin main; then
                echo "pushed on attempt $attempt"
                exit 0
              fi
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::push failed after 3 attempts"
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Notify Discord — success
        if: success() && steps.current.outputs.tag != inputs.image_tag
        run: |
          curl -s -H "Content-Type: application/json" \
            -X POST \
            -d "{\"embeds\":[{\"title\":\"Dev Deploy Succeeded\",\"description\":\"**Service:** ${{ inputs.service_name }}\n**Tag:** ${{ inputs.image_tag }}\n**Actor:** ${{ github.actor }}\n**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"color\":3066993}]}" \
            "${{ secrets.DISCORD_DEPLOY_WEBHOOK }}"

      - name: Notify Discord — failure
        if: failure()
        run: |
          curl -s -H "Content-Type: application/json" \
            -X POST \
            -d "{\"embeds\":[{\"title\":\"Dev Deploy Failed\",\"description\":\"**Service:** ${{ inputs.service_name }}\n**Tag:** ${{ inputs.image_tag }}\n**Actor:** ${{ github.actor }}\n**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"color\":16711680}]}" \
            "${{ secrets.DISCORD_DEPLOY_WEBHOOK }}"
