name: Release Deploy

# Called after main-release.yaml creates a GitHub Release.
# Retags the :sha ECR image with the semver tag and updates
# helm/values-prod.yaml for ArgoCD prod sync.

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service name (e.g. undercurrent-accounts)"
        required: true
        type: string

permissions:
  id-token: write
  contents: write

jobs:
  release-deploy:
    name: Tag & Deploy Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest release tag
        id: release
        run: |
          TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$TAG" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No release tag found, skipping"
            exit 0
          fi
          # Only proceed if the release tag points to HEAD or its parent
          TAG_SHA=$(git rev-list -n 1 "$TAG")
          HEAD_SHA=$(git rev-parse HEAD)
          PARENT_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          if [ "$TAG_SHA" != "$HEAD_SHA" ] && [ "$TAG_SHA" != "$PARENT_SHA" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Latest tag $TAG ($TAG_SHA) is not at HEAD ($HEAD_SHA) or parent, skipping"
            exit 0
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          # Get the SHA that was built by the docker job (the merge commit before release commits)
          echo "build_sha=$TAG_SHA" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG -> $TAG_SHA"

      - name: Configure AWS credentials
        if: steps.release.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.release.outputs.skip != 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Retag image with semver
        if: steps.release.outputs.skip != 'true'
        run: |
          REPO="${{ steps.ecr-login.outputs.registry }}/${{ inputs.service_name }}"
          SHA="${{ steps.release.outputs.build_sha }}"
          TAG="${{ steps.release.outputs.tag }}"

          echo "Retagging $REPO:$SHA as $REPO:$TAG"

          # Pull the manifest and put it with the new tag
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name "${{ inputs.service_name }}" \
            --image-ids imageTag="$SHA" \
            --query 'images[0].imageManifest' \
            --output text \
            --region ${{ vars.AWS_REGION }})

          if [ "$MANIFEST" = "None" ] || [ -z "$MANIFEST" ]; then
            echo "ERROR: Image $SHA not found in ECR, trying :latest"
            MANIFEST=$(aws ecr batch-get-image \
              --repository-name "${{ inputs.service_name }}" \
              --image-ids imageTag="latest" \
              --query 'images[0].imageManifest' \
              --output text \
              --region ${{ vars.AWS_REGION }})
          fi

          aws ecr put-image \
            --repository-name "${{ inputs.service_name }}" \
            --image-tag "$TAG" \
            --image-manifest "$MANIFEST" \
            --region ${{ vars.AWS_REGION }} || echo "Tag may already exist"

          echo "Tagged $REPO:$TAG"

      - name: Install yq
        if: steps.release.outputs.skip != 'true'
        uses: mikefarah/yq@master

      - name: Update prod image tag
        if: steps.release.outputs.skip != 'true'
        run: |
          TAG="${{ steps.release.outputs.tag }}"

          # Create values-prod.yaml if it doesn't exist
          if [ ! -f helm/values-prod.yaml ]; then
            cat > helm/values-prod.yaml <<EOF
          base-service:
            deployment:
              image:
                tag: "$TAG"
          EOF
          else
            yq -i '.["base-service"].deployment.image.tag = "'"$TAG"'"' helm/values-prod.yaml
          fi

      - name: Commit and push
        if: steps.release.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values-prod.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update prod image tag to ${{ steps.release.outputs.tag }} [skip ci]"
          git push
